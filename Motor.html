<!DOCTYPE html>
<html>
<head>
    <title>Moto X3M - TTMTAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <style> body { margin: 0; background: #87CEEB; overflow: hidden; } #info { position: absolute; top: 10px; left: 10px; font-family: sans-serif; } </style>
</head>
<body>
    <div id="info"><b>OK TUŞLARI:</b> Git ve Takla At | <a href="index.html">ANA MENÜ</a></div>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Body, Constraint } = Matter;
        const engine = Engine.create();
        const render = Render.create({ element: document.body, engine: engine, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#87CEEB' } });

        const chassis = Bodies.rectangle(200, 300, 60, 15, { render: { fillStyle: 'red' } });
        const w1 = Bodies.circle(170, 320, 15, { friction: 0.8, render: { fillStyle: '#222' } });
        const w2 = Bodies.circle(230, 320, 15, { friction: 0.8, render: { fillStyle: '#222' } });
        const s1 = Constraint.create({ bodyA: chassis, pointA: {x:-25, y:10}, bodyB: w1, stiffness: 0.2, length: 10 });
        const s2 = Constraint.create({ bodyA: chassis, pointA: {x:25, y:10}, bodyB: w2, stiffness: 0.2, length: 10 });
        
        const ground = Bodies.rectangle(1500, 600, 5000, 100, { isStatic: true, render: { fillStyle: '#2e7d32' } });
        const ramp = Bodies.rectangle(800, 550, 200, 20, { isStatic: true, angle: -0.5, render: { fillStyle: '#5d4037' } });

        Composite.add(engine.world, [chassis, w1, w2, s1, s2, ground, ramp]);
        
        const keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        Matter.Events.on(engine, 'beforeUpdate', () => {
            if (keys['ArrowRight']) Body.setAngularVelocity(w2, 0.2);
            if (keys['ArrowLeft']) Body.setAngularVelocity(w1, -0.2);
            if (keys['ArrowUp']) Body.rotate(chassis, 0.05);
            if (keys['ArrowDown']) Body.rotate(chassis, -0.05);
            render.bounds.min.x = chassis.position.x - 300; render.bounds.max.x = chassis.position.x + 600;
        });

        Render.run(render); Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
