<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Extreme Moto X3M - TTMTAL Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ffcc; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #00ffcc; pointer-events: none; }
        #level-info { position: absolute; top: 20px; right: 20px; color: #ff0055; font-size: 24px; font-weight: bold; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <b>KONTROLLER:</b> <br>
        GAZ: Sağ Ok | FREN: Sol Ok <br>
        DENGE: Yukarı/Aşağı Ok <br>
        <a href="index.html" style="color: #fff; text-decoration: underline; pointer-events: auto;">ANA MENÜYE DÖN</a>
    </div>
    <div id="level-info">BÖLÜM: 1 (AKSİYON MODU)</div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Body, Constraint, Events } = Matter;

        const engine = Engine.create();
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#1a1a1a' // Gece yarışı teması
            }
        });

        // --- 1. DAHA BÜYÜK VE GÜÇLÜ MOTOR ---
        const chassis = Bodies.rectangle(200, 300, 100, 25, { 
            render: { fillStyle: '#ff0055' }, 
            chamfer: { radius: 5 },
            density: 0.02
        });
        const frontWheel = Bodies.circle(250, 330, 25, { friction: 0.9, render: { fillStyle: '#333', strokeStyle: '#00ffcc', lineWidth: 5 } });
        const backWheel = Bodies.circle(150, 330, 25, { friction: 0.9, render: { fillStyle: '#333', strokeStyle: '#00ffcc', lineWidth: 5 } });
        
        const suspension1 = Constraint.create({ bodyA: chassis, pointA: {x: 40, y: 15}, bodyB: frontWheel, stiffness: 0.1, length: 15, render: { visible: true, strokeStyle: '#555' } });
        const suspension2 = Constraint.create({ bodyA: chassis, pointA: {x: -40, y: 15}, bodyB: backWheel, stiffness: 0.1, length: 15, render: { visible: true, strokeStyle: '#555' } });

        const motor = Composite.create();
        Composite.add(motor, [chassis, frontWheel, backWheel, suspension1, suspension2]);

        // --- 2. BÖLÜM TASARIMI VE AKSİYON ELEMANLARI ---
        const ground = Bodies.rectangle(1500, 600, 5000, 60, { isStatic: true, render: { fillStyle: '#222' } });
        
        // Rampalar
        const ramp1 = Bodies.rectangle(700, 540, 300, 20, { isStatic: true, angle: -0.4, render: { fillStyle: '#444' } });
        const ramp2 = Bodies.rectangle(1200, 450, 300, 20, { isStatic: true, angle: 0.3, render: { fillStyle: '#444' } });

        // Tehlikeli Çiviler (Değersen yanarsın mantığı için eklendi)
        const spikes = Bodies.rectangle(1000, 560, 150, 20, { isStatic: true, render: { fillStyle: '#ff0000' }, label: 'danger' });

        // Patlayan Variller (Fiziksel engel)
        const barrels = [
            Bodies.circle(1150, 500, 20, { density: 0.05, render: { fillStyle: '#e67e22' } }),
            Bodies.circle(1150, 460, 20, { density: 0.05, render: { fillStyle: '#e67e22' } }),
            Bodies.circle(1150, 420, 20, { density: 0.05, render: { fillStyle: '#e67e22' } })
        ];

        Composite.add(engine.world, [motor, ground, ramp1, ramp2, spikes, ...barrels]);

        // --- 3. KONTROLLER VE KAMERA ---
        const keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        Events.on(engine, 'beforeUpdate', () => {
            if (keys['ArrowRight']) {
                Body.setAngularVelocity(backWheel, 0.3);
                Body.setAngularVelocity(frontWheel, 0.3);
            }
            if (keys['ArrowLeft']) {
                Body.setAngularVelocity(backWheel, -0.2);
            }
            // Havada Takla ve Denge
            if (keys['ArrowUp']) Body.setAngularVelocity(chassis, 0.06);
            if (keys['ArrowDown']) Body.setAngularVelocity(chassis, -0.06);

            // Gelişmiş Kamera Takibi
            render.bounds.min.x = chassis.position.x - 400;
            render.bounds.max.x = chassis.position.x + 600;
            render.bounds.min.y = chassis.position.y - 400;
            render.bounds.max.y = chassis.position.y + 300;
        });

        // Çarpışma Kontrolü (Aksiyon için)
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                if (pair.bodyA.label === 'danger' || pair.bodyB.label === 'danger') {
                    alert("ÇİVİLERE BASTIN! MOTOR PARÇALANDI!");
                    location.reload();
                }
            });
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
